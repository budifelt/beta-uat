<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  
  <!-- Meta Tags -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="eDM Helper WFH Tracker - Track your work from home schedule">
  <meta name="keywords" content="edm, wfh, tracker, schedule, remote work">
  <meta name="author" content="eDM Helper">
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/pages-wfh-tracker.css">
  
  <title>WFH Tracker - eDM Helper</title>
  <meta name="theme-color" content="#0f172a" />
  <!-- Font Awesome - Non-blocking load -->
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"></noscript>
</head>
<body>
  <!-- Navigation Bar -->
  <header class="header" role="banner">
    <nav class="nav" role="navigation" aria-label="Main navigation">
      <!-- Home Button -->
      <div class="nav-left">
        <a href="index.html" class="nav-link">
          <i class="fa-solid fa-home"></i>
          <span>Home</span>
        </a>
      </div>
      
      <div class="nav-right">
        <!-- Additional navigation items can be added here -->
      </div>
    </nav>
  </header>

  <main id="main-content" class="page">
    <div class="container">
      <!-- Page Title -->
      <div class="page-title">
        <h2>WFH Tracker</h2>
        <p>Klik tanggal untuk mengubah status: Normal → WFH → WFO</p>
      </div>
      
      <!-- Legend -->
      <div class="legend">
        <div class="legend-item">
          <div class="legend-color wfh"></div>
          <span class="legend-text">WFH (Work From Home)</span>
        </div>
        <div class="legend-item">
          <div class="legend-color wfo"></div>
          <span class="legend-text">WFO (Work From Office)</span>
        </div>
        <div class="legend-item">
          <div class="legend-color holiday"></div>
          <span class="legend-text">Hari Libur</span>
        </div>
        <div class="legend-item">
          <div class="legend-color weekend"></div>
          <span class="legend-text">Akhir Pekan</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: var(--warning-bg); border: 2px solid var(--warning); position: relative;">
            <span style="position: absolute; top: -2px; right: -2px; font-size: 8px; font-weight: bold; color: var(--warning); background: white; width: 12px; height: 12px; display: flex; align-items: center; justify-content: center;">C</span>
          </div>
          <span class="legend-text">Cuti Bersama</span>
        </div>
      </div>
      
      <div class="stars" id="stars"></div>
      <div class="calendar">
        <div class="calendar-header">
            <button id="prev-month">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/>
              </svg>
            </button>
            <h1 id="month-year"></h1>
            <div class="header-buttons">
              <button id="today-btn" title="Go to Today">Today</button>
              <button id="next-month">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>
                </svg>
              </button>
            </div>
          </div>
          <div id="calendar-days" class="days"></div>
        </div>
        <div id="holiday-description" class="holiday-description"></div>
        
        <!-- Summary Statistics -->
        <div class="summary-stats">
          <h3>Statistik Bulanan</h3>
          <div class="stats-grid">
            <div class="stat-item">
              <div class="stat-value" id="total-days">0</div>
              <div class="stat-label">Total Hari</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="work-days">0</div>
              <div class="stat-label">Hari Kerja</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="holidays-count">0</div>
              <div class="stat-label">Hari Libur</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="wfh-percentage">0%</div>
              <div class="stat-label">Persentase WFH</div>
            </div>
          </div>
        </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer" role="contentinfo">
    <div class="container">
      <div class="footer-content">
        <div class="footer-left">
          <p class="footer-text">
            &copy; <span id="footer-year">2025</span> eDM Helper <span class="footer-version" data-version>v1.0.0</span>. 
            Built with <i class="fa-solid fa-heart"></i> for developers.
          </p>
        </div>
        <div class="footer-right">
          <nav class="footer-links" aria-label="Social media links">
            <a href="https://github.com/budifelt" target="_blank" class="footer-link" aria-label="GitHub">
              <i class="fa-brands fa-github"></i>
            </a>
            <a href="https://instagram.com/budife.psd/" target="_blank" class="footer-link" aria-label="Instagram">
              <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://linkedin.com/in/budifelt/" target="_blank" class="footer-link" aria-label="LinkedIn">
              <i class="fa-brands fa-linkedin"></i>
            </a>
          </nav>
        </div>
      </div>
    </div>
  </footer>

<script src="js/version-config.js" defer></script>
<script src="js/pages-wfh-tracker.js" defer></script>
</body>
</html>
