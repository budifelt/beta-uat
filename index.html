<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">


  
  <!-- Meta Tags -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="eDM Helper - Collection of useful tools for email marketing and productivity">
  <meta name="keywords" content="edm, email marketing, tools, utility, productivity, bookmarklet, campaign">
  <meta name="author" content="eDM Helper">
  
  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  
  <!-- CSS -->
  <link rel="preload" href="css/theme.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" href="css/base.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" href="css/components.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" href="css/components/nav.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" href="css/utilities.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" href="css/pages/index.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/components/nav.css">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/pages/index.css">
  </noscript>
  
  <title>eDM Helper - Tools for Email Marketing & Productivity</title>
  <meta name="theme-color" content="#F18C8E" />
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"></noscript>
  
  <style>
    /* CSS Loading Overlay */
    #css-loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    
    #css-loading-overlay.loaded {
      opacity: 0;
      pointer-events: none;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f18c8e;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Hide body until CSS is loaded */
    body {
      opacity: 0;
    }
    
    body.loaded {
      opacity: 1;
      transition: opacity 0.3s ease;
    }
  </style>
</head>
<body>
<!-- CSS Loading Overlay -->
<div id="css-loading-overlay">
  <div class="loading-spinner"></div>
</div>

<!-- Sidebar Menu -->
<nav id="sidebar" class="sidebar-menu">
  <nav class="sidebar-nav" role="navigation" aria-label="Main navigation">
    <div class="sidebar-section">
      <div class="sidebar-section-title">
        <span class="sidebar-title-text">Tools</span>
      </div>
      <a href="#bookmarklet" class="sidebar-item" data-page="bookmarklet" data-tooltip="Bookmarklet Tools">
        <i class="fa-solid fa-code"></i>
        <span class="sidebar-item-text">Bookmarklet Tools</span>
      </a>
      <a href="#campaign-counter" class="sidebar-item" data-page="campaign-counter" data-tooltip="Campaign Counter">
        <i class="fa-solid fa-hashtag"></i>
        <span class="sidebar-item-text">Campaign Counter</span>
      </a>
      <a href="#config" class="sidebar-item" data-page="config" data-tooltip="Config eDM">
        <i class="fa-solid fa-sliders"></i>
        <span class="sidebar-item-text">Config eDM</span>
      </a>
      <a href="#database-checker" class="sidebar-item" data-page="database-checker" data-tooltip="Database Checker">
        <i class="fa-solid fa-magnifying-glass-chart"></i>
        <span class="sidebar-item-text">Database Checker</span>
      </a>
      <a href="#database-generator" class="sidebar-item" data-page="database-generator" data-tooltip="Database Generator">
        <i class="fa-solid fa-file-circle-plus"></i>
        <span class="sidebar-item-text">Database Generator</span>
      </a>
      <a href="#layout-checker" class="sidebar-item" data-page="layout-checker" data-tooltip="Layout Checker">
        <i class="fa-solid fa-object-group"></i>
        <span class="sidebar-item-text">Layout Checker</span>
      </a>
      <a href="#link-checker" class="sidebar-item" data-page="link-checker" data-tooltip="Link Checker">
        <i class="fa-solid fa-check-double"></i>
        <span class="sidebar-item-text">Link Checker</span>
      </a>
      <a href="#wfh-tracker" class="sidebar-item" data-page="wfh-tracker" data-tooltip="WFH Tracker">
        <i class="fa-solid fa-house-laptop"></i>
        <span class="sidebar-item-text">WFH Tracker</span>
      </a>
    </div>
    
    <!-- Footer Section -->
    <div class="sidebar-footer">
      <div class="version-info">
        <span class="version-text">v8.1.0</span>
      </div>
      <div class="created-with">
        <span class="love-text">Created with</span>
        <i class="fa-solid fa-heart love-icon"></i>
      </div>
      <div class="social-links">
        <a href="https://github.com" target="_blank" class="social-link" data-tooltip="GitHub" aria-label="Visit our GitHub page">
          <i class="fa-brands fa-github" aria-hidden="true"></i>
        </a>
        <a href="https://linkedin.com" target="_blank" class="social-link" data-tooltip="LinkedIn" aria-label="Visit our LinkedIn page">
          <i class="fa-brands fa-linkedin" aria-hidden="true"></i>
        </a>
        <a href="https://twitter.com" target="_blank" class="social-link" data-tooltip="Twitter" aria-label="Visit our Twitter page">
          <i class="fa-brands fa-twitter" aria-hidden="true"></i>
        </a>
        <a href="mailto:contact@edmhelper.com" class="social-link" data-tooltip="Email" aria-label="Send us an email">
          <i class="fa-solid fa-envelope" aria-hidden="true"></i>
        </a>
      </div>
    </div>
  </nav>
</nav>

<!-- Sidebar Overlay for mobile -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- Top Navigation Bar -->
<nav class="top-nav">
  <div class="nav-left">
    <a href="#index" class="nav-btn home-btn" aria-label="Navigate to home page">
      <i class="fa-solid fa-home"></i>
      <span class="home-text">eDM Helper</span>
    </a>
  </div>
  <div class="nav-center">
    <div class="nav-brand">
      <i class="fa-solid fa-envelope-open-text"></i>
      <span class="nav-title">eDM Helper</span>
    </div>
  </div>
  <div class="nav-right">
    <button class="nav-btn mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle mobile menu">
      <i class="fa-solid fa-bars"></i>
    </button>
  </div>
</nav>

<!-- Main Content Container -->
  <main id="main-content" role="main">
    <!-- Content will be loaded here by SPA router -->
  </main>

<!-- Modal Container -->
  <div id="settings-container" role="dialog" ></div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/codemirror.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/mode/xml/xml.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/addon/edit/closebrackets.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/addon/mode/overlay.min.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/theme/material.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="js/utils.js" defer></script>
  <script src="js/version-config.js" defer></script>
  
  <!-- Remove CSS loading overlay when page is ready -->
  <script>
    window.addEventListener('load', () => {
      const overlay = document.getElementById('css-loading-overlay');
      const body = document.body;
      
      if (overlay) {
        overlay.classList.add('loaded');
        setTimeout(() => {
          overlay.remove();
        }, 300);
      }
      
      if (body) {
        body.classList.add('loaded');
      }
    });
  </script>
  <script src="js/components/sidebar.js" defer></script>
  <script src="js/components/spa-router.js" defer></script>
</body>
</html>
