<!DOCTYPE html>

<html lang="en">

<head>

  <!-- Favicon -->

  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">

  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">

  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

  

  <!-- Meta Tags -->

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="eDM Helper Configuration - Configure your marketing tools">

  <meta name="keywords" content="edm, config, settings, marketing, tools">

  <meta name="author" content="eDM Helper">

  

  <!-- DNS Prefetch & Preconnect for CDN -->
  <link rel="dns-prefetch" href="//cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/pages-config.css">

  <title>Config eDM - eDM Helper</title>
  <meta name="theme-color" content="#0f172a" />

  <!-- Font Awesome - Non-blocking load -->
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"></noscript>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/codemirror.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/theme/monokai.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/dialog/dialog.min.css" />

</head>

<body>

  <main id="main-content">
  <div class="layout">
  <div class="container">

    <nav class="sidebar flex flex-col" role="navigation" aria-label="File explorer">

      <div class="sidebar-header">

        <button id="openFolderBtn" class="btn" title="Open Folder" aria-label="Open folder">

          <i class="fa-solid fa-folder-open" aria-hidden="true"></i> Open Folder

        </button>

        <button id="refreshTreeBtn" class="btn secondary" title="Refresh" aria-label="Refresh file tree">

          <i class="fa-solid fa-refresh" aria-hidden="true"></i>

        </button>

      </div>

      <div class="sidebar-body flex-1">

        <div id="fileTree" class="file-tree" role="tree" aria-label="File tree"></div>

      </div>

      <div class="resize-handle" id="resizeHandle" aria-label="Resize sidebar"></div>

    </nav>

    <section class="content flex-1" aria-label="Configuration editor">

      <header class="content-header">

        <div class="breadcrumb" id="breadcrumb" aria-live="polite" aria-atomic="true">No folder</div>

        <div id="campaignCountIndicator" class="campaign-count-indicator" aria-live="polite" aria-atomic="true">0/7</div>

      </header>

      

      <form id="configForm" onsubmit="return false" aria-label="Campaign configuration">

      <div class="controls">

        <div class="field campaign-id-field">

          <label for="campaignId">

            Campaign ID

          </label>

          <div class="control">

            <div class="input-wrapper campaign-id-field">

              <input id="campaignId" type="text" placeholder="YYYYMMDD[X]_nama-campaign_XXX atau XXXX" aria-describedby="campaignIdWarningTooltip campaignIdMismatchTooltip campaignIdCharCount" autocomplete="off" />

              <span id="campaignIdWarningTooltip" class="warning-tooltip"></span>

              <span id="campaignIdMismatchTooltip" class="mismatch-tooltip"></span>

              <span id="campaignIdCharCount" class="char-count">0</span>

              <span id="campaignIdCheckmark" class="checkmark" style="display:none"><i class="fa-solid fa-check"></i></span>

            </div>

          </div>

        </div>



        <div class="field">

          <label for="subject">Subject</label>

          <div class="control">

            <div class="input-wrapper subject-field">

              <input id="subject" type="text" placeholder="Subject with <%[KRHRED_Unit_XX]|%>" aria-describedby="subjectCharCount" autocomplete="off" />

              <span id="subjectCharCount" class="char-count">0</span>

              <span id="subjectCheckmark" class="checkmark" style="display:none"><i class="fa-solid fa-check"></i></span>

            </div>

          </div>

        </div>



        <div class="field link-field">

          <label for="link">

            Link

          </label>

          <div class="control">

            <div class="input-wrapper link-field">

              <input id="link" type="url" placeholder="http://mail.hsbc.com.hk/1450-campaign-name.html" aria-describedby="linkValidationTooltip linkMismatchTooltip linkCharCount mismatchWarning" autocomplete="off" />

              <span id="linkValidationTooltip" class="validation-tooltip"></span>

              <span id="linkMismatchTooltip" class="mismatch-tooltip"></span>

              <span id="linkCharCount" class="char-count">0</span>

              <span id="mismatchWarning" class="warn" style="display:none">!</span>

              <span id="linkCheckmark" class="checkmark" style="display:none"><i class="fa-solid fa-check"></i></span>

            </div>

          </div>

        </div>



        <div class="buttons">

          <button id="applyUpdateBtn" class="btn" type="button" aria-label="Apply updates to XML"><i class="fa-solid fa-wand-magic-sparkles" aria-hidden="true"></i> Apply Update</button>

          <button id="saveFileBtn" class="btn" type="button" title="Save File" aria-label="Save current file">

            <i class="fa-solid fa-save" aria-hidden="true"></i> Save

          </button>

        </div>

      </div>

      </form>



      <div class="editor-container">

        <textarea id="editor" class="editor" aria-label="XML editor"></textarea>

      </div>

    </section>

  </div>
  </div>
  </main>



  


  <div id="overlay" class="overlay" hidden aria-hidden="true">

    <div class="spinner" role="status" aria-label="Loading">

      <i class="fa-solid fa-rotate fa-spin" aria-hidden="true"></i>

      <div>Loading…</div>

    </div>

  </div>



  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/codemirror.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/xml/xml.min.js" defer></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/fold/xml-fold.min.js" defer></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/edit/matchtags.min.js" defer></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/search/searchcursor.min.js" defer></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/search/search.min.js" defer></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/search/jump-to-line.min.js" defer></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/dialog/dialog.min.js" defer></script>

  <!-- Floating Info Button -->
  <button id="footer-toggle" class="footer-toggle" aria-label="Show footer info" title="About eDM Helper">
    <i class="fa-solid fa-info"></i>
  </button>

  <!-- Back to Home Button -->
  <a href="index.html" class="back-to-home" aria-label="Back to home" title="Back to home">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
      <polyline points="9 22 9 12 15 12 15 22"></polyline>
    </svg>
  </a>


  <!-- Footer Modal -->
  <div id="footer-modal" class="footer-modal" role="dialog" aria-modal="true" aria-label="About eDM Helper">
    <div class="footer-modal-content">
      <div class="footer-modal-body">
        <nav class="footer-links" aria-label="Social media links">
          <a href="https://github.com/budife" target="_blank" class="footer-link" aria-label="Visit GitHub profile">
            <i class="fa-brands fa-github" aria-hidden="true"></i>
            <span>GitHub</span>
          </a>
          <a href="https://instagram.com/budife.psd/" target="_blank" class="footer-link" aria-label="Visit Instagram profile">
            <i class="fa-brands fa-instagram" aria-hidden="true"></i>
            <span>Instagram</span>
          </a>
          <a href="https://linkedin.com/in/budife/" target="_blank" class="footer-link" aria-label="Visit LinkedIn profile">
            <i class="fa-brands fa-linkedin" aria-hidden="true"></i>
            <span>LinkedIn</span>
          </a>
        </nav>
        <p class="footer-text">
          &copy; <span id="footer-year">2025</span> eDM Helper <span class="footer-version" data-version>v1.0.0</span>. 
          Built with <i class="fa-solid fa-heart"></i> for developers.
        </p>
      </div>
    </div>
  </div>

  <!-- Include Settings Modal -->
  <div id="settings-container"></div>


  <!-- Core Scripts (Load First) -->

  <script src="js/footer.js" defer></script>

  <script src="js/version-config.js" defer></script>

  <!-- Page Scripts (Load Last) -->

  <script src="js/pages-config.js" defer></script>

</body>

</html>
