<section class="config-section" aria-label="Configuration page">
  <div class="container">
    <div class="main-layout">
      <!-- Top Controls Bar -->
      <header class="config-header" role="toolbar" aria-label="Folder controls">
        <div class="config-controls">
          <button id="openFolderBtn" class="btn" title="Open Folder" aria-label="Open folder">
            <i class="fa-solid fa-folder-open" aria-hidden="true"></i>
            <span>Open Folder</span>
          </button>
          <button id="refreshTreeBtn" class="btn secondary" title="Refresh" aria-label="Refresh file tree">
            <i class="fa-solid fa-refresh" aria-hidden="true"></i>
            <span class="sr-only">Refresh</span>
          </button>
        </div>
        <div class="config-info">
          <div class="breadcrumb" id="breadcrumb" aria-live="polite" aria-atomic="true">No folder</div>
          <div id="campaignCountIndicator" class="campaign-count-indicator" aria-live="polite" aria-atomic="true" aria-label="Campaign count">0/7</div>
        </div>
      </header>

      <!-- Main Content Area -->
      <main class="config-middle" role="main">
        <!-- File Explorer Sidebar -->
        <aside class="folder-panel" role="navigation" aria-label="File explorer">
          <div class="folder-header">
            <h2 id="folderTreeTitle">Folders</h2>
          </div>
          <div class="folder-body" role="tree" aria-labelledby="folderTreeTitle">
            <div id="fileTree" class="file-tree" aria-label="File tree"></div>
          </div>
        </aside>

        <!-- Configuration Form with Editor -->
        <section class="form-panel" aria-label="Campaign configuration">
          <form id="configForm" novalidate aria-label="Campaign configuration form">
            <!-- Campaign ID Field -->
            <div class="field campaign-id-field">
              <label for="campaignId">Campaign ID</label>
              <div class="input-wrapper">
                <input 
                  id="campaignId" 
                  type="text" 
                  name="campaignId"
                  placeholder="YYYYMMDD[X]_nama-campaign_XXX atau XXXX" 
                  aria-describedby="campaignIdWarningTooltip campaignIdMismatchTooltip campaignIdCharCount"
                  autocomplete="off"
                  required
                />
                <span id="campaignIdWarningTooltip" class="warning-tooltip" role="tooltip"></span>
                <span id="campaignIdMismatchTooltip" class="mismatch-tooltip" role="tooltip"></span>
                <span id="campaignIdCharCount" class="char-count" aria-live="polite">0</span>
                <span id="campaignIdCheckmark" class="checkmark" aria-hidden="true">
                  <i class="fa-solid fa-check"></i>
                </span>
              </div>
            </div>

            <!-- Subject Field -->
            <div class="field">
              <label for="subject">Subject</label>
              <div class="input-wrapper">
                <input 
                  id="subject" 
                  type="text" 
                  name="subject"
                  placeholder="Subject with <%[KRHRED_Unit_XX]|%>" 
                  aria-describedby="subjectCharCount"
                  autocomplete="off"
                  required
                />
                <span id="subjectCharCount" class="char-count" aria-live="polite">0</span>
                <span id="subjectCheckmark" class="checkmark" aria-hidden="true">
                  <i class="fa-solid fa-check"></i>
                </span>
              </div>
            </div>

            <!-- Link Field -->
            <div class="field link-field">
              <label for="link">Link</label>
              <div class="input-wrapper">
                <input 
                  id="link" 
                  type="url" 
                  name="link"
                  placeholder="http://mail.hsbc.com.hk/1450-campaign-name.html" 
                  aria-describedby="linkValidationTooltip linkMismatchTooltip linkCharCount mismatchWarning"
                  autocomplete="off"
                  required
                />
                <span id="linkValidationTooltip" class="validation-tooltip" role="tooltip"></span>
                <span id="linkMismatchTooltip" class="mismatch-tooltip" role="tooltip"></span>
                <span id="linkCharCount" class="char-count" aria-live="polite">0</span>
                <span id="mismatchWarning" class="warn" aria-hidden="true" style="display:none">!</span>
                <span id="linkCheckmark" class="checkmark" aria-hidden="true">
                  <i class="fa-solid fa-check"></i>
                </span>
              </div>
            </div>

            <!-- Action Buttons -->
            <div class="buttons" role="group" aria-label="Form actions">
              <button id="applyUpdateBtn" class="btn primary" type="button" aria-label="Apply updates to XML">
                <i class="fa-solid fa-wand-magic-sparkles" aria-hidden="true"></i>
                <span>Apply Update</span>
              </button>
              <button id="saveFileBtn" class="btn" type="button" title="Save File" aria-label="Save current file">
                <i class="fa-solid fa-save" aria-hidden="true"></i>
                <span>Save</span>
              </button>
            </div>

            <!-- XML Editor Section -->
            <div class="editor-section">
              <header class="editor-header">
                <h2 id="editorTitle">XML Editor</h2>
              </header>
              <div class="editor-container" role="application" aria-label="XML code editor">
                <textarea 
                  id="editor" 
                  class="editor" 
                  aria-label="XML editor"
                  spellcheck="false"
                  aria-describedby="editorTitle"
                  style="display: none;"
                ></textarea>
              </div>
            </div>
          </form>
        </section>
      </main>
    </div>
  </div>
</section>
