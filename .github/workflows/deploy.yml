name: Build & Deploy Minified Site

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Minify Tools
        run: npm install -g html-minifier-terser terser clean-css-cli

      - name: Copy project to dist
        run: |
          mkdir dist
          rsync -av --exclude=dist ./ dist/

      - name: Minify HTML files
        run: |
          find dist -type f -name "*.html" -exec html-minifier-terser {} -o {} \
          --collapse-whitespace --remove-comments --minify-css true --minify-js true \;

      - name: Minify CSS files
        run: |
          find dist -type f -name "*.css" -exec cleancss -o {} {} \;

      - name: Minify JS files
        run: |
          find dist -type f -name "*.js" -exec terser {} -o {} -c -m \;

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist